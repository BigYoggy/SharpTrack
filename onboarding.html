<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up Workspace | SharpTrack</title>
    <link rel="icon" type="image/png" href="logo2.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Shared Design System CSS for variables & global resets -->
    <link rel="stylesheet" href="css/design-system.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: 'var(--primary)',
                            dark: 'var(--primary-dark)',
                            light: 'var(--primary-light)',
                            glow: 'var(--primary-ghost)',
                        },
                        bg: {
                            DEFAULT: 'var(--bg)',
                            secondary: 'var(--bg-secondary)',
                            card: 'var(--card-bg)',
                        },
                        border: {
                            DEFAULT: 'var(--border)',
                            light: 'var(--border-light)',
                        },
                        text: {
                            DEFAULT: 'var(--text)',
                            secondary: 'var(--text-secondary)',
                            muted: 'var(--muted)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .bg-glow {
            background: radial-gradient(circle at top center, var(--primary-ghost) 0%, transparent 60%);
        }
    </style>
</head>
<body class="h-full font-sans text-text bg-bg flex items-center justify-center p-4 relative overflow-x-hidden transition-colors duration-300">
    <!-- Top Ambient Glow -->
    <div class="absolute top-0 left-0 w-full h-[500px] bg-glow pointer-events-none z-0"></div>

    <div class="w-full max-w-[420px] bg-bg-card border border-border p-8 rounded-2xl shadow-lg relative z-10 animate-fade-in transition-all duration-300">
        <!-- Progress Steps (Step 2 of 2) -->
        <div class="flex items-center justify-between mb-8">
            <span class="text-xs font-bold text-brand uppercase tracking-wider">Step 2 of 2</span>
            <div class="flex space-x-1.5">
                <div class="w-8 h-1.5 rounded-full bg-brand/30"></div>
                <div class="w-8 h-1.5 rounded-full bg-brand"></div>
            </div>
        </div>

        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold font-outfit text-left">Set Up Your Store Workspace</h1>
            <p class="text-text-muted text-sm mt-1 text-left font-light">Tell us a bit about your store to customize your dashboard features.</p>
        </div>

        <!-- Onboarding Form -->
        <form onsubmit="handleOnboarding(event);" class="space-y-5">
            <div>
                <label for="storeName" class="block text-xs font-semibold text-text-muted uppercase tracking-wider mb-2">Store / Business Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-text-muted">
                        <svg class="h-5 width-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                    </span>
                    <input type="text" id="storeName" placeholder="e.g. Alpha Pharmacy & Stores" 
                           class="w-full bg-bg border border-border rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-brand text-text transition-colors duration-200" required>
                </div>
            </div>

            <div>
                <label for="businessSector" class="block text-xs font-semibold text-text-muted uppercase tracking-wider mb-2">Business Sector</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-text-muted pointer-events-none">
                        <svg class="h-5 width-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </span>
                    <input type="text" id="businessSector" list="industries" placeholder="Search or select industry..." 
                           class="w-full bg-bg border border-border rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-brand text-text transition-colors duration-200" required>
                    <datalist id="industries">
                        <option value="Pharmacy / Healthcare">
                        <option value="Supermarket / Grocery">
                        <option value="Boutique / Fashion & Apparel">
                        <option value="Restaurant / Food Services">
                        <option value="Electronics / Gadgets">
                        <option value="Hardware / Construction">
                        <option value="Cosmetics / Beauty">
                        <option value="General Retail / Provision Store">
                        <option value="Wholesale / Distribution">
                        <option value="Services">
                        <option value="Other Retail Business">
                    </datalist>
                </div>
            </div>

            <button type="submit" id="onboarding-btn" 
                    class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-3 px-4 rounded-xl text-sm transition-all duration-200 transform active:scale-[0.98] mt-4 flex items-center justify-center shadow-md">
                Launch Dashboard &rarr;
            </button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        // Check if logged in, redirect if not or already onboarded
        if (!isLoggedIn()) {
            window.location.href = 'index.html';
        } else {
            const user = getUser();
            if (user && user.onboardingCompleted) {
                window.location.href = 'dashboard.html';
            }
        }

        async function handleOnboarding(event) {
            event.preventDefault();
            const storeName = document.getElementById('storeName').value.trim();
            const businessSector = document.getElementById('businessSector').value;
            const btn = document.getElementById('onboarding-btn');

            if (!storeName) {
                showToast('warning', 'Store Name Required', 'Please enter your store name.');
                return;
            }
            if (!businessSector) {
                showToast('warning', 'Sector Required', 'Please choose your business sector.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full mr-2"></span>Launching Dashboard...`;

            try {
                const res = await apiRequest('/api/auth/profile', {
                    method: 'PUT',
                    body: JSON.stringify({ 
                        storeName, 
                        businessSector, 
                        onboardingCompleted: true 
                    })
                });

                // Update local user state
                const user = getUser();
                if (user) {
                    user.storeName = storeName;
                    user.businessSector = businessSector;
                    user.onboardingCompleted = true;
                    localStorage.setItem('st_user', JSON.stringify(user));
                }

                showToast('success', 'Workspace Configured! 🎉', 'Welcome to your dashboard.');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } catch (err) {
                showToast('error', 'Onboarding Failed', err.message);
                btn.disabled = false;
                btn.innerHTML = 'Launch Dashboard &rarr;';
            }
        }
    </script>
</body>
</html>
