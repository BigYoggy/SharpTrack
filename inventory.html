<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack — Inventory</title>
    <meta name="description" content="Manage your product inventory with SharpTrack.">
    <link rel="icon" type="image/png" href="logo2.png">
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body { padding-bottom: 90px; }

        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-title h1 { font-size: 24px; }
        .page-title p { font-size: 14px; color: var(--muted); margin-top: 3px; }

        /* Standardized button styles used in page */

        .inventory-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .inventory-item:last-child { border-bottom: none; }

        .inventory-img {
            width: 48px; height: 48px;
            border-radius: var(--radius-md);
            background: var(--border-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .inventory-info { flex: 1; min-width: 0; }
        .inventory-info .name { font-size: 14px; font-weight: 600; color: var(--text); }
        .inventory-info .category { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

        .inventory-meta { text-align: right; flex-shrink: 0; }
        .inventory-meta .price { font-size: 14px; font-weight: 700; color: var(--text); }
        .inventory-meta .stock { font-size: 12px; font-weight: 600; margin-top: 2px; }
        .inventory-meta .stock.low { color: var(--orange); }
        .inventory-meta .stock.out { color: var(--red); }
        .inventory-meta .stock.in { color: var(--primary); }
        
        #restockModal {
            z-index: 1010 !important;
        }
    </style>
</head>
<body>

    <div class="content" id="main-content">
        <div class="page-title">
            <div>
                <h1>Inventory</h1>
                <p>Manage and monitor your products.</p>
            </div>
            <button class="btn btn-primary btn-sm" onclick="window.location.href='add-stock.html'">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Stock
            </button>
        </div>

        <!-- STAT CARDS -->
        <div class="stat-cards" id="inv-stats">
            <div class="skeleton skeleton-stat"></div>
            <div class="skeleton skeleton-stat"></div>
        </div>

        <!-- SEARCH -->
        <div class="search-row">
            <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()">
            </div>
            <button class="btn btn-outline btn-sm" onclick="exportProductsToCSV(allProducts)" style="padding: 10px 14px; border-radius: var(--radius-md);" title="Export CSV">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
        </div>

        <!-- PRODUCT LIST -->
        <div class="section">
            <div class="section-header">
                <h2>Product List</h2>
                <span id="product-count" class="text-muted text-sm"></span>
            </div>
            <div id="productList">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </div>
    </div>

    <!-- RESTOCK MODAL -->
    <div id="restockModal" class="modal-overlay" onclick="closeRestockModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h2 style="margin-bottom: 8px;">Restock Product</h2>
            <p class="text-muted" style="margin-bottom: 20px; font-size: 14px;">Add stock quantity for this product.</p>
            
            <div class="input-group">
                <label>Product Name</label>
                <div class="input-wrapper">
                    <input type="text" id="restock-product-name" readonly style="background: var(--border-light); cursor: not-allowed; padding: 12px 16px;">
                </div>
            </div>
            
            <div class="input-group" style="margin-top: 16px;">
                <label>Current Stock</label>
                <div class="input-wrapper">
                    <input type="text" id="restock-current-stock" readonly style="background: var(--border-light); cursor: not-allowed; padding: 12px 16px;">
                </div>
            </div>

            <div class="input-group" style="margin-top: 16px;">
                <label>Quantity to Add</label>
                <div class="input-wrapper">
                    <input type="number" id="restock-quantity-add" placeholder="e.g. 50" min="1" step="1" required style="padding: 12px 16px;">
                </div>
            </div>

            <div style="margin-top: 24px; display: flex; gap: 12px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeRestockModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" id="confirm-restock-btn" onclick="submitRestock()">Confirm</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let allProducts = [];

        if (!initPage('inventory')) { /* redirected */ }
        else {
            injectNavbar();
            injectBottomNav('inventory');
            loadInventory();
        }

        async function loadInventory() {
            try {
                const [productData, statsData] = await Promise.allSettled([
                    apiRequest('/api/products'),
                    apiRequest('/api/products/stats')
                ]);

                // Stats
                if (statsData.status === 'fulfilled') {
                    const s = statsData.value;
                    document.getElementById('inv-stats').innerHTML = `
                        <div class="stat-card animate-fadeUp">
                            <div class="stat-icon green"><svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
                            <div class="label">Total Products</div>
                            <div class="value">${s.totalProducts}</div>
                            <div class="sub">In your inventory</div>
                        </div>
                        <div class="stat-card ${s.lowStockCount > 0 ? 'alert' : ''} animate-fadeUp" style="animation-delay:0.1s;">
                            <div class="stat-icon ${s.lowStockCount > 0 ? 'orange' : 'green'}">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            </div>
                            <div class="label">Low Stock</div>
                            <div class="value">${s.lowStockCount}</div>
                            <div class="sub">${s.lowStockCount > 0 ? 'Need attention' : 'All good!'}</div>
                        </div>
                    `;
                }

                // Products
                if (productData.status === 'fulfilled') {
                    allProducts = productData.value.products || [];
                    renderProducts(allProducts);
                    
                    // Filter if 'q' query parameter exists
                    const params = new URLSearchParams(window.location.search);
                    const query = params.get('q');
                    if (query) {
                        const searchInput = document.getElementById('searchInput');
                        if (searchInput) {
                            searchInput.value = query;
                            filterProducts();
                        }
                    }
                } else {
                    document.getElementById('productList').innerHTML = '<div class="empty-state"><h3>Failed to load</h3><p>Could not fetch products.</p></div>';
                }

            } catch (err) {
                showToast('error', 'Error', err.message);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productList');
            document.getElementById('product-count').textContent = products.length + ' items';

            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                        </div>
                        <h3>No products yet</h3>
                        <p>Add your first product to start tracking your inventory.</p>
                        <button class="btn btn-primary btn-sm" onclick="window.location.href='add-stock.html'">Add Product</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map((p, i) => {
                let stockClass = 'in';
                if (p.quantity === 0) stockClass = 'out';
                else if (p.quantity <= p.reorderLevel) stockClass = 'low';

                const imageHtml = p.image 
                    ? `<img src="${p.image}" alt="${p.name}" style="width:100%; height:100%; object-fit:cover; border-radius:var(--radius-md);">`
                    : `📦`;

                return `
                <div class="inventory-item animate-slideUp" style="animation-delay:${i * 0.03}s;" data-name="${p.name.toLowerCase()}">
                    <div class="inventory-img">${imageHtml}</div>
                    <div class="inventory-info">
                        <div class="name">${p.name}</div>
                        <div class="category">${p.unit}</div>
                    </div>
                    <div class="inventory-meta" style="display: flex; flex-direction: column; align-items: flex-end;">
                        <div class="price">${formatCurrency(p.sellingPrice)}</div>
                        <div class="stock ${stockClass}" style="margin-bottom: 4px;">${p.quantity === 0 ? 'Out of stock' : p.quantity + ' ' + p.unit}</div>
                        <button class="btn btn-outline" onclick="openRestockModal('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.quantity}, '${p.unit}')" style="padding: 4px 8px; font-size: 11px; height: auto; border-radius: var(--radius-sm); line-height: 1;">
                            Restock
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        // Restock Modal Logic
        let currentRestockProductId = null;
        let currentRestockCurrentQuantity = 0;

        function openRestockModal(productId, productName, currentQuantity, unit) {
            currentRestockProductId = productId;
            currentRestockCurrentQuantity = currentQuantity;
            
            document.getElementById('restock-product-name').value = productName;
            document.getElementById('restock-current-stock').value = `${currentQuantity} ${unit}`;
            document.getElementById('restock-quantity-add').value = '';
            
            const modal = document.getElementById('restockModal');
            if (modal) {
                modal.classList.add('open');
                document.getElementById('restock-quantity-add').focus();
            }
        }

        function closeRestockModal() {
            const modal = document.getElementById('restockModal');
            if (modal) {
                modal.classList.remove('open');
            }
        }

        async function submitRestock() {
            const qtyInput = document.getElementById('restock-quantity-add');
            const qtyAdd = parseInt(qtyInput.value, 10);
            
            if (isNaN(qtyAdd) || qtyAdd <= 0) {
                showToast('error', 'Invalid Quantity', 'Please enter a valid quantity greater than 0.');
                return;
            }

            const confirmBtn = document.getElementById('confirm-restock-btn');
            confirmBtn.disabled = true;
            const originalBtnText = confirmBtn.textContent;
            confirmBtn.textContent = 'Updating...';

            try {
                const newQuantity = currentRestockCurrentQuantity + qtyAdd;
                
                await apiRequest(`/api/products/${currentRestockProductId}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        quantity: newQuantity
                    })
                });

                showToast('success', 'Restock Success', `Successfully updated stock level to ${newQuantity}.`);
                closeRestockModal();
                loadInventory();
            } catch (err) {
                showToast('error', 'Error', err.message || 'Failed to update stock quantity.');
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.textContent = originalBtnText;
            }
        }
    </script>
</body>
</html>
