<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SharpTrack — Inventory Software for Nigeria</title>
    <meta name="description" content="Create your SharpTrack account. Set up your retail shop inventory, track daily store sales, and generate reports using our easy-to-use business software.">
    <link rel="icon" type="image/png" href="logo2.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Shared Design System CSS for variables & global resets -->
    <link rel="stylesheet" href="css/design-system.css">
    
    <!-- Tailwind CSS CDN -->
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: 'var(--primary)',
                            dark: 'var(--primary-dark)',
                            light: 'var(--primary-light)',
                            glow: 'var(--primary-ghost)',
                        },
                        bg: {
                            DEFAULT: 'var(--bg)',
                            secondary: 'var(--bg-secondary)',
                            card: 'var(--card-bg)',
                        },
                        border: {
                            DEFAULT: 'var(--border)',
                            light: 'var(--border-light)',
                        },
                        text: {
                            DEFAULT: 'var(--text)',
                            secondary: 'var(--text-secondary)',
                            muted: 'var(--muted)',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Sign-In Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .bg-glow {
            background: radial-gradient(circle at top center, var(--primary-ghost) 0%, transparent 60%);
        }
    </style>
</head>
<body class="h-full font-sans text-text bg-bg flex items-center justify-center p-4 relative overflow-x-hidden transition-colors duration-300">
    <!-- Top Ambient Glow -->
    <div class="absolute top-0 left-0 w-full h-[500px] bg-glow pointer-events-none z-0"></div>

    <div class="w-full max-w-[420px] bg-bg-card border border-border p-8 rounded-2xl shadow-lg relative z-10 animate-fade-in transition-all duration-300">
        <!-- Logo Header -->
        <div id="signup-logo-header" class="flex flex-col items-center mb-8">
            <img src="logo2.png" alt="SharpTrack Logo" class="h-10 mb-6 brightness-100 dark:brightness-125 transition-all duration-200">
            <h1 class="text-2xl font-bold font-outfit text-center">Create Your Account</h1>
            <p class="text-text-muted text-sm mt-1 text-center font-light">Get started with Nigeria's mobile-first inventory engine.</p>
        </div>

        <!-- Google One-Tap & Button Container -->
        <div class="space-y-4 mb-6" id="google-btn-section">
            <div id="google-btn-wrapper" class="w-full min-h-[44px] relative rounded-xl overflow-hidden shadow-md" style="height: 44px;">
                <!-- Custom Visual Button -->
                <button type="button" class="w-full h-full flex items-center justify-center gap-2 bg-brand text-white font-semibold text-sm cursor-pointer border-none transition-colors duration-200">
                    <svg class="w-4 h-4 bg-white rounded-full p-[2px]" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign up with Google
                </button>
                <!-- Invisible Google Iframe Container -->
                <div id="google-signin-btn" class="absolute top-0 left-0 w-full h-full opacity-0 flex items-center justify-center z-10"></div>
            </div>
        </div>

        <!-- Divider -->
        <div id="signup-divider" class="relative flex py-3 items-center mb-6">
            <div class="flex-grow border-t border-border"></div>
            <span class="flex-shrink mx-4 text-text-muted text-xs uppercase tracking-wider font-semibold">Or register with email</span>
            <div class="flex-grow border-t border-border"></div>
        </div>

        <!-- Signup Form Container -->
        <div id="signup-form-container">
            <!-- Email Sign Up Form -->
            <form onsubmit="event.preventDefault(); handleEmailSignup();" class="space-y-4">
                <div>
                    <label for="name" class="block text-xs font-semibold text-text-muted uppercase tracking-wider mb-2">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-text-muted">
                            <svg class="h-5 width-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </span>
                        <input type="text" id="name" placeholder="John Doe" 
                               class="w-full bg-bg border border-border rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-brand text-text transition-colors duration-200" required>
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-xs font-semibold text-text-muted uppercase tracking-wider mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-text-muted">
                            <svg class="h-5 width-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </span>
                        <input type="email" id="email" placeholder="owner@pharmacy.com" 
                               class="w-full bg-bg border border-border rounded-xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:border-brand text-text transition-colors duration-200" required>
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-xs font-semibold text-text-muted uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-text-muted">
                            <svg class="h-5 width-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </span>
                        <input type="password" id="password" placeholder="Min. 6 characters" 
                               class="w-full bg-bg border border-border rounded-xl py-3 pl-10 pr-10 text-sm focus:outline-none focus:border-brand text-text transition-colors duration-200" required>
                        <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-muted hover:text-text transition-colors duration-150">
                            <svg id="eye-icon" class="h-5 width-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-start mb-4 mt-2">
                    <div class="flex items-center h-5">
                        <input id="terms" type="checkbox" required class="w-4 h-4 border border-border rounded bg-bg focus:ring-3 focus:ring-brand accent-brand">
                    </div>
                    <label for="terms" class="ml-2 text-xs text-text-muted">
                        I agree to the <a href="terms.html" class="text-brand hover:underline" target="_blank">Terms and Conditions</a> and <a href="privacy.html" class="text-brand hover:underline" target="_blank">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" id="email-signup-btn" 
                        class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-3 px-4 rounded-xl text-sm transition-all duration-200 transform active:scale-[0.98] mt-2 shadow-md">
                    Create Account
                </button>
            </form>

            <!-- Redirect Link -->
            <div class="mt-6 text-center text-sm text-text-muted">
                Already have an account? <a href="index.html" class="text-brand hover:text-brand-dark font-semibold transition-colors duration-150">Sign In</a>
            </div>
        </div>

        <!-- OTP Form Container (Hidden initially) -->
        <div id="otp-form-container" class="hidden animate-fade-in flex flex-col items-center w-full">
            <!-- Shield Icon -->
            <div class="w-16 h-16 bg-brand/10 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            
            <h3 class="text-2xl font-bold text-center mb-2">Verify Your Email</h3>
            <p class="text-sm text-text-muted text-center mb-6">We've sent a 6-digit verification code to</p>
            
            <!-- Email Pill -->
            <div class="inline-flex items-center gap-2 bg-brand/10 rounded-lg px-4 py-2.5 mb-6">
                <svg class="w-5 h-5 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                <span id="display-email" class="font-semibold text-brand tracking-wide"></span>
            </div>

            <hr class="w-full border-t border-border mb-6">
            
            <form onsubmit="event.preventDefault(); handleOtpVerification();" class="w-full flex flex-col items-center">
                <label class="block text-sm font-bold text-text self-start mb-4">Enter OTP</label>
                
                <div class="flex justify-between w-full gap-2 mb-8">
                    <input type="text" maxlength="1" class="otp-box w-full max-w-[50px] h-14 bg-bg border-2 border-border rounded-lg text-center text-xl font-bold text-text focus:outline-none focus:border-brand transition-colors">
                    <input type="text" maxlength="1" class="otp-box w-full max-w-[50px] h-14 bg-bg border-2 border-border rounded-lg text-center text-xl font-bold text-text focus:outline-none focus:border-brand transition-colors">
                    <input type="text" maxlength="1" class="otp-box w-full max-w-[50px] h-14 bg-bg border-2 border-border rounded-lg text-center text-xl font-bold text-text focus:outline-none focus:border-brand transition-colors">
                    <input type="text" maxlength="1" class="otp-box w-full max-w-[50px] h-14 bg-bg border-2 border-border rounded-lg text-center text-xl font-bold text-text focus:outline-none focus:border-brand transition-colors">
                    <input type="text" maxlength="1" class="otp-box w-full max-w-[50px] h-14 bg-bg border-2 border-border rounded-lg text-center text-xl font-bold text-text focus:outline-none focus:border-brand transition-colors">
                    <input type="text" maxlength="1" class="otp-box w-full max-w-[50px] h-14 bg-bg border-2 border-border rounded-lg text-center text-xl font-bold text-text focus:outline-none focus:border-brand transition-colors">
                </div>

                <hr class="w-full border-t border-border mb-6">
                
                <div class="flex flex-col items-center gap-2 mb-8">
                    <div class="flex items-center gap-2 text-sm text-text-muted">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>Didn't receive the code?</span>
                    </div>
                    <button type="button" class="text-brand font-semibold text-sm hover:underline" onclick="resendOtp()">Resend OTP <span class="font-normal text-brand/80" id="otp-timer">in 25s</span></button>
                </div>
                
                <button type="submit" id="verify-otp-btn" 
                        class="w-full bg-brand hover:bg-brand-dark text-white font-semibold py-3.5 px-4 rounded-xl text-sm transition-all duration-200 transform active:scale-[0.98] shadow-md">
                    Verify & Continue
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="signup.html" class="text-brand font-semibold text-sm hover:underline">Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        // Check if logged in, redirect accordingly
        if (isLoggedIn()) {
            const user = getUser();
            if (user && user.onboardingCompleted) {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'onboarding.html';
            }
        }

        window.onload = async function() {

            
            // Fetch Google Client ID from backend config
            try {
                const config = await apiRequest('/api/auth/google-client-id');
                if (config.clientId) {
                    google.accounts.id.initialize({
                        client_id: config.clientId,
                        callback: handleCredentialResponse
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("google-signin-btn"),
                        { 
                            theme: "outline", 
                            size: "large",
                            width: "356", 
                            type: "standard", 
                            text: "signup_with"
                        }
                    );
                } else {
                    document.getElementById("google-signin-btn").innerHTML = 
                        `<div class="text-center text-xs text-brand/80 py-2.5 border border-brand/20 rounded-xl bg-brand/5">
                            Google Authentication is not configured.
                         </div>`;
                }
            } catch (err) {
                console.error('Failed to load Google Client ID config:', err);
                document.getElementById("google-signin-btn").innerHTML = 
                    `<div class="text-center text-xs text-red-500/80 py-2.5 border border-red-500/20 rounded-xl bg-red-500/5">
                        Could not contact identity server.
                     </div>`;
            }
        };

        function togglePasswordVisibility() {
            const passInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                `;
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        }

        async function handleCredentialResponse(response) {
            const token = response.credential;
            const btnWrapper = document.getElementById('google-btn-wrapper');
            if (btnWrapper) btnWrapper.style.opacity = '0.5';

            try {
                const res = await apiRequest('/api/auth/google', {
                    method: 'POST',
                    body: JSON.stringify({ token })
                });

                showToast('success', 'Logged in! 🎉', 'Google login successful.');
                setAuth(res.token, res.user);

                setTimeout(() => {
                    if (res.user.onboardingCompleted) {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'onboarding.html';
                    }
                }, 800);
            } catch (err) {
                showToast('error', 'Google Auth Failed', err.message);
                if (btnWrapper) btnWrapper.style.opacity = '1';
            }
        }

        let signupData = null;

        async function handleEmailSignup() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('email-signup-btn');

            if (!name || !email || !password) {
                showToast('warning', 'Missing Fields', 'Please fill in all fields.');
                return;
            }

            if (name.length < 2) {
                showToast('warning', 'Invalid Name', 'Name must be at least 2 characters.');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('warning', 'Invalid Email', 'Please enter a valid email address.');
                return;
            }

            if (password.length < 6) {
                showToast('warning', 'Weak Password', 'Password must be at least 6 characters.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full mr-2"></span>Sending Code...`;

            try {
                // Send OTP to email
                await apiRequest('/api/otp/send-email', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                });

                signupData = { name, email, password };
                
                // Show OTP form and hide logo, Google button, divider
                document.getElementById('signup-logo-header').classList.add('hidden');
                document.getElementById('google-btn-section').classList.add('hidden');
                document.getElementById('signup-divider').classList.add('hidden');
                document.getElementById('signup-form-container').classList.add('hidden');
                document.getElementById('otp-form-container').classList.remove('hidden');
                document.getElementById('display-email').textContent = email;

                showToast('success', 'Code Sent', 'Please check your email for the verification code.');
            } catch (err) {
                showToast('error', 'Error', err.message);
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        }

        async function handleOtpVerification() {
            const otpBoxes = document.querySelectorAll('.otp-box');
            let otp = '';
            otpBoxes.forEach(box => otp += box.value);
            
            const btn = document.getElementById('verify-otp-btn');

            if (!otp || otp.length !== 6) {
                showToast('warning', 'Invalid Code', 'Please enter the 6-digit code.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full mr-2"></span>Verifying...`;

            try {
                // Verify OTP
                await apiRequest('/api/otp/verify-email', {
                    method: 'POST',
                    body: JSON.stringify({ email: signupData.email, otp })
                });

                // Create Account
                btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full mr-2"></span>Creating Account...`;

                const response = await apiRequest('/api/auth/register-email', {
                    method: 'POST',
                    body: JSON.stringify(signupData)
                });

                showToast('success', 'Welcome! 🎉', 'Your account has been created.');
                setAuth(response.token, response.user);

                setTimeout(() => {
                    window.location.href = 'onboarding.html';
                }, 800);
            } catch (err) {
                showToast('error', 'Verification Failed', err.message);
                btn.disabled = false;
                btn.innerHTML = 'Verify & Continue';
            }
        }

        function resendOtp() {
            // Re-trigger email signup to resend
            handleEmailSignup();
        }

        // OTP Boxes auto-advance logic
        document.addEventListener('DOMContentLoaded', () => {
            const otpBoxes = document.querySelectorAll('.otp-box');
            otpBoxes.forEach((box, index) => {
                box.addEventListener('input', (e) => {
                    // Allow only numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    if (e.target.value.length === 1 && index < otpBoxes.length - 1) {
                        otpBoxes[index + 1].focus();
                    }
                });
                box.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        otpBoxes[index - 1].focus();
                    }
                });
                // Handle paste
                box.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                    for (let i = 0; i < pastedData.length; i++) {
                        if (otpBoxes[index + i]) {
                            otpBoxes[index + i].value = pastedData[i];
                            if (index + i < otpBoxes.length - 1) {
                                otpBoxes[index + i + 1].focus();
                            } else {
                                otpBoxes[index + i].focus();
                            }
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
