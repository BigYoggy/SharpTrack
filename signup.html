<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpTrack - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a4d33;
            --primary-dark: #083b27;
            --primary-light: #e9f1ed;
            --bg: #fdf6e2;
            --bg-card: rgba(255,255,255,0.45);
            --border:#c0ccc6;
            --placeholder:#99a7a0;
            --label: #4a5d55;
            --text: #1a2e26;
            --gradient-blob-1: rgba(10, 77, 51, 0.07);
            --gradient-blob-2: rgba(10, 77, 51, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        html {
            height: 100%;
        }

        body {
            background-color:#fdf6e2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Extra blob bottom center */
        .blob-center {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(10, 77, 51, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* Logo */
            .logo-section {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 44px;
        }

        .logo-img {
            width: 280px; /* Adjust based on the actual logo image aspect ratio */
            max-width: 100%;
            height: auto;
        }
        

        .logo-svg {
            width: 58px;
            height: 58px;
        }

        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: var(--label);
            margin-bottom: 8px;
            letter-spacing: 0.1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            background-color: rgba(255, 255, 255, 0.5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 400;
            color: var(--text);
            outline: none;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .input-wrapper input::placeholder {
            color: var(--placeholder);
            font-weight: 400;
        }

        .icon-left {
            position: absolute;
            left: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .icon-right {
            position: absolute;
            right: 15px;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: opacity 0.2s;
        }

        .icon-right:hover {
            opacity: 0.7;
        }

        svg.icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Sign Up Button */
        .signup-btn {
            width: 100%;
            padding: 17px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 0.2px;
            transition: background-color 0.25s, transform 0.1s, box-shadow 0.25s;
            box-shadow: 0 4px 20px rgba(10, 77, 51, 0.25);
        }

        .signup-btn:hover {
            background-color: var(--primary-dark);
            box-shadow: 0 6px 24px rgba(10, 77, 51, 0.35);
        }

        .signup-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        .footer-text {
            margin-top: 28px;
            font-size: 14px;
            color: #7a8e86;
            text-align: center;
            font-weight: 500;
        }

        .signin-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .signin-link:hover {
            text-decoration: underline;
        }

        /* PIN input - numbers only keyboard on mobile */
        input[inputmode="numeric"] {
            letter-spacing: 4px;
            font-size: 18px;
            font-weight: 600;
        }

        input[inputmode="numeric"]::placeholder {
            letter-spacing: normal;
            font-size: 15px;
            font-weight: 400;
        }

        /* Smooth page load */
        .container {
            animation: fadeUp 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Responsive tweaks */
        @media (max-width: 380px) {
            body { padding: 28px 16px 60px; }
            .logo-name { font-size: 26px; }
            .signup-btn { font-size: 16px; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="blob-center"></div>

    <div class="container">

        <!-- Logo -->
        <div class="logo-section">
            <img src="logo3.png" alt="SharpTrack Logo" class="logo-img">
        </div>

        <!-- Signup Form -->
        <form id="signupForm" novalidate>

            <!-- First Name -->
            <div class="form-group">
                <label for="firstName">First Name</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="firstName" placeholder="Enter your first name" autocomplete="given-name">
                </div>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="lastName" placeholder="Enter your last name" autocomplete="family-name">
                </div>
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12.9a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.59 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                    </span>
                    <input type="tel" id="phone" placeholder="Enter your phone number" autocomplete="tel">
                </div>
            </div>

            <!-- PIN -->
            <div class="form-group">
                <label for="pin">PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="pin" placeholder="Enter 6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password">
                    <span class="icon-right" onclick="toggleVisibility('pin', this)">
                        <svg class="icon" id="pin-eye" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <path d="m1 1 22 22"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Confirm PIN -->
            <div class="form-group">
                <label for="confirmPin">Confirm PIN</label>
                <div class="input-wrapper">
                    <span class="icon-left">
                        <svg class="icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="confirmPin" placeholder="Confirm your PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="new-password">
                    <span class="icon-right" onclick="toggleVisibility('confirmPin', this)">
                        <svg class="icon" id="confirmPin-eye" viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <path d="m1 1 22 22"/>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="button" class="signup-btn" onclick="handleSignup()">Sign Up</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="index.html" class="signin-link">Sign In</a>
        </div>

    </div>

    <script>
        function toggleVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.getAttribute('type') === 'password';
            input.setAttribute('type', isPassword ? 'text' : 'password');

            // Swap icon between eye-off and eye
            btn.innerHTML = isPassword
                ? `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                   </svg>`
                : `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <path d="m1 1 22 22"/>
                   </svg>`;
        }

        function handleSignup() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const confirmPin = document.getElementById('confirmPin').value.trim();

            if (!firstName || !lastName || !phone || !pin || !confirmPin) {
                alert('Please fill in all fields.');
                return;
            }

            if (pin.length !== 6 || !/^\d+$/.test(pin)) {
                alert('PIN must be exactly 6 digits.');
                return;
            }

            if (pin !== confirmPin) {
                alert('PINs do not match. Please try again.');
                return;
            }

            // Redirect to dashboard when backend is ready
            alert('Account created successfully!');
            // window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
